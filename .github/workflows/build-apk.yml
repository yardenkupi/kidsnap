name: Build KidSnap APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-licenses: true

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Setup Gradle Wrapper
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            gradle wrapper --gradle-version 8.4 --distribution-type bin
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Ensure facenet.tflite placeholder exists
        run: |
          mkdir -p app/src/main/assets
          if [ ! -f app/src/main/assets/facenet.tflite ]; then
            dd if=/dev/urandom bs=1 count=100 2>/dev/null > app/src/main/assets/facenet.tflite
            echo "WARNING: Using dummy facenet.tflite - replace with real model for actual face recognition"
          fi

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: KidSnap-v1.0-debug-build${{ github.run_number }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Show APK info
        run: |
          echo "=== APK Build Complete ==="
          ls -lh app/build/outputs/apk/debug/
          echo "Download from GitHub Actions → Artifacts tab"
