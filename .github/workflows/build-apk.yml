name: Build KidSnap APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-licenses: true

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Setup Gradle Wrapper
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            gradle wrapper --gradle-version 8.4 --distribution-type bin
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Verify FaceNet TFLite model
        run: |
          SIZE=$(stat -c%s app/src/main/assets/facenet.tflite 2>/dev/null || echo 0)
          echo "Model size: $SIZE bytes"
          if [ "$SIZE" -lt 1000000 ]; then
            echo "ERROR: facenet.tflite missing or too small ($SIZE bytes)."
            echo "The model must be committed to app/src/main/assets/facenet.tflite"
            exit 1
          fi
          echo "Model OK: $SIZE bytes"

      - name: Set up signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "Using stored keystore from secrets..."
            echo "$KEYSTORE_BASE64" | base64 --decode > keystore.jks
            echo "RELEASE_STORE_FILE=$(pwd)/keystore.jks" >> $GITHUB_ENV
            echo "RELEASE_KEY_ALIAS=$KEY_ALIAS" >> $GITHUB_ENV
            echo "RELEASE_KEY_PASSWORD=$KEY_PASSWORD" >> $GITHUB_ENV
            echo "RELEASE_STORE_PASSWORD=$STORE_PASSWORD" >> $GITHUB_ENV
          else
            echo "No keystore secrets found — generating a self-signed keystore..."
            keytool -genkeypair \
              -keystore keystore.jks \
              -alias kidsnap \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -storepass kidsnap2024 \
              -keypass kidsnap2024 \
              -dname "CN=KidSnap, OU=App, O=Personal, L=IL, S=IL, C=IL" \
              -noprompt
            echo "RELEASE_STORE_FILE=$(pwd)/keystore.jks" >> $GITHUB_ENV
            echo "RELEASE_KEY_ALIAS=kidsnap" >> $GITHUB_ENV
            echo "RELEASE_KEY_PASSWORD=kidsnap2024" >> $GITHUB_ENV
            echo "RELEASE_STORE_PASSWORD=kidsnap2024" >> $GITHUB_ENV
            echo ""
            echo "TIP: To keep the same signature across builds (required for app updates),"
            echo "run these commands locally and add the output as GitHub secrets:"
            echo "  1. Generate once:  keytool -genkeypair -keystore kidsnap-release.jks -alias kidsnap -keyalg RSA -keysize 2048 -validity 10000 -storepass YOUR_PASS -keypass YOUR_PASS -dname \"CN=KidSnap\" -noprompt"
            echo "  2. Base64 encode:  base64 -w 0 kidsnap-release.jks"
            echo "  3. Add 4 secrets to GitHub repo: KEYSTORE_BASE64, KEY_ALIAS=kidsnap, KEY_PASSWORD=YOUR_PASS, STORE_PASSWORD=YOUR_PASS"
          fi

      - name: Build Release APK
        run: |
          ./gradlew assembleRelease \
            -PRELEASE_STORE_FILE="$RELEASE_STORE_FILE" \
            -PRELEASE_KEY_ALIAS="$RELEASE_KEY_ALIAS" \
            -PRELEASE_KEY_PASSWORD="$RELEASE_KEY_PASSWORD" \
            -PRELEASE_STORE_PASSWORD="$RELEASE_STORE_PASSWORD" \
            --stacktrace

      - name: Get version info
        id: version
        run: |
          VERSION_NAME=$(grep 'versionName' app/build.gradle.kts | sed 's/.*"\(.*\)".*/\1/')
          VERSION_CODE=$(grep 'versionCode' app/build.gradle.kts | sed 's/[^0-9]//g')
          echo "name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "Version: $VERSION_NAME ($VERSION_CODE)"

      - name: Rename APK
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/release/app-release.apk \
             dist/KidSnap-v${{ steps.version.outputs.name }}-build${{ github.run_number }}.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: KidSnap-v${{ steps.version.outputs.name }}-release-build${{ github.run_number }}
          path: dist/KidSnap-v${{ steps.version.outputs.name }}-build${{ github.run_number }}.apk
          retention-days: 30

      - name: Show APK info
        run: |
          echo "=== Release APK Build Complete ==="
          echo "Version: ${{ steps.version.outputs.name }} (code ${{ steps.version.outputs.code }})"
          ls -lh dist/
          echo ""
          echo "This is a RELEASE build — no 'unsafe app' warnings."
          echo "Package ID: com.childfilter.app"
          echo "Download from: GitHub Actions → Artifacts tab"
