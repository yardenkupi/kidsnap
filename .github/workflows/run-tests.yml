name: Run KidSnap Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_run:
    workflows: ["Build KidSnap APK"]
    types: [ completed ]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-licenses: true

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Setup Gradle Wrapper
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            gradle wrapper --gradle-version 8.4 --distribution-type bin
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Verify FaceNet TFLite model
        run: |
          SIZE=$(stat -c%s app/src/main/assets/facenet.tflite 2>/dev/null || echo 0)
          echo "Model size: $SIZE bytes"
          if [ "$SIZE" -lt 1000000 ]; then
            echo "ERROR: facenet.tflite missing or too small ($SIZE bytes)."
            echo "The model must be committed to app/src/main/assets/facenet.tflite"
            exit 1
          fi
          echo "Model OK: $SIZE bytes"

      - name: Run unit tests
        run: ./gradlew test --stacktrace

      - name: Upload unit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: app/build/reports/tests/
          retention-days: 14

  # ── Shared emulator setup steps (defined once, reused via YAML anchors) ──
  # Note: GitHub Actions doesn't support true YAML anchors, so steps are inlined per job.

  instrumented-tests-home:
    name: Instrumented Tests — Home & Navigation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-licenses: true

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Setup Gradle Wrapper
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            gradle wrapper --gradle-version 8.4 --distribution-type bin
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Verify FaceNet TFLite model
        run: |
          SIZE=$(stat -c%s app/src/main/assets/facenet.tflite 2>/dev/null || echo 0)
          if [ "$SIZE" -lt 1000000 ]; then
            echo "ERROR: facenet.tflite missing ($SIZE bytes)"; exit 1
          fi
          echo "Model OK: $SIZE bytes"

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run HomeScreenTest and NavigationTest
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          arch: x86_64
          script: >
            ./gradlew connectedAndroidTest
            -Pandroid.testInstrumentationRunnerArguments.class=com.childfilter.app.HomeScreenTest,com.childfilter.app.NavigationTest
            --stacktrace

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: instrumented-test-results-home
          path: app/build/reports/androidTests/
          retention-days: 14

