name: Run KidSnap Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-licenses: true

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Setup Gradle Wrapper
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            gradle wrapper --gradle-version 8.4 --distribution-type bin
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Download FaceNet TFLite model
        run: |
          mkdir -p app/src/main/assets
          echo "Downloading MobileFaceNet model from MediaPipe..."
          curl -L --fail --silent \
            "https://storage.googleapis.com/mediapipe-models/face_embedder/mobilefacenet/float16/1/mobile_face_net.tflite" \
            -o app/src/main/assets/facenet.tflite && \
          echo "Model downloaded: $(stat -c%s app/src/main/assets/facenet.tflite) bytes" || \
          (echo "WARNING: Download failed, using placeholder" && \
           dd if=/dev/urandom bs=1024 count=512 2>/dev/null > app/src/main/assets/facenet.tflite)

      - name: Run unit tests
        run: ./gradlew test --stacktrace

      - name: Upload unit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: app/build/reports/tests/
          retention-days: 14

  instrumented-tests:
    name: Instrumented Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-licenses: true

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Setup Gradle Wrapper
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            gradle wrapper --gradle-version 8.4 --distribution-type bin
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Download FaceNet TFLite model
        run: |
          mkdir -p app/src/main/assets
          echo "Downloading MobileFaceNet model from MediaPipe..."
          curl -L --fail --silent \
            "https://storage.googleapis.com/mediapipe-models/face_embedder/mobilefacenet/float16/1/mobile_face_net.tflite" \
            -o app/src/main/assets/facenet.tflite && \
          echo "Model downloaded: $(stat -c%s app/src/main/assets/facenet.tflite) bytes" || \
          (echo "WARNING: Download failed, using placeholder" && \
           dd if=/dev/urandom bs=1024 count=512 2>/dev/null > app/src/main/assets/facenet.tflite)

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run instrumented tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          arch: x86_64
          script: ./gradlew connectedAndroidTest --stacktrace

      - name: Upload instrumented test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: instrumented-test-results
          path: app/build/reports/androidTests/
          retention-days: 14
